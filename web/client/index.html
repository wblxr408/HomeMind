<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeMind — 智能家居中央指令器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f4f0;
            --bg-tertiary: #eeece7;
            --text-primary: #1a1a18;
            --text-secondary: #5a5a56;
            --text-tertiary: #9a9994;
            --border-light: rgba(0, 0, 0, 0.10);
            --border-mid: rgba(0, 0, 0, 0.15);
            --accent: #1D9E75;
            --accent-light: #5DCAA5;
            --accent-bg: #E1F5EE;
            --bubble-user: #2C2C2A;
            --bubble-user-text: #F1EFE8;
            --radius-md: 8px;
            --radius-lg: 12px;
            --panel-width: 220px;
            --progress-height: 2px;
            --progress-label-size: 9px;
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background: var(--bg-tertiary);
            background-image:
                radial-gradient(circle at top, rgba(29, 158, 117, 0.10), transparent 26%),
                linear-gradient(180deg, #f3f1eb 0%, #ebe7e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-primary);
        }

        .app {
            display: flex;
            flex-direction: column;
            width: 900px;
            height: 680px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            overflow: hidden;
            border: 0.5px solid var(--border-light);
            box-shadow: var(--shadow);
            position: relative;
        }

        .topbar {
            background: var(--bg-primary);
            border-bottom: 0.5px solid var(--border-light);
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-logo {
            width: 52px;
            height: 52px;
            object-fit: contain;
            flex-shrink: 0;
            display: block;
        }

        .brand-copy {
            min-width: 0;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 1px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            box-shadow: 0 0 0 6px rgba(29, 158, 117, 0.10);
            animation: pulse 2s infinite;
        }

        .clock {
            font-size: 12px;
            color: var(--text-tertiary);
            font-variant-numeric: tabular-nums;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        .progress-wrap {
            flex-shrink: 0;
            background: var(--bg-primary);
            border-bottom: 0.5px solid var(--border-light);
            padding: 5px 18px 6px;
        }

        .progress-labels {
            display: flex;
            margin-bottom: 4px;
        }

        .progress-label {
            flex: 1;
            font-size: var(--progress-label-size);
            color: var(--text-tertiary);
            text-align: center;
            line-height: 1.2;
        }

        .progress-label.done { color: var(--text-secondary); }
        .progress-label.active { color: #0F6E56; }
        .progress-label.error { color: #b44b3a; }

        .progress-track {
            height: var(--progress-height);
            display: flex;
            gap: 2px;
            border-radius: 1px;
            overflow: hidden;
        }

        .progress-step {
            flex: 1;
            background: var(--border-light);
            border-radius: 1px;
        }

        .progress-step.done { background: var(--accent); }
        .progress-step.active { background: var(--accent-light); }
        .progress-step.error { background: #d97f6c; }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .chat-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(245,244,240,0.7) 100%);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 78%;
        }

        .msg.user { align-self: flex-end; align-items: flex-end; }
        .msg.ai, .msg.system { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 9px 13px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 4px;
        }

        .msg.ai .bubble,
        .msg.system .bubble {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 0.5px solid var(--border-light);
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 3px;
            padding: 0 2px;
        }

        .action-tag {
            display: inline-block;
            margin-top: 6px;
            font-size: 11px;
            color: #0F6E56;
            background: var(--accent-bg);
            padding: 2px 7px;
            border-radius: 4px;
        }

        .voice-feedback {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .voice-feedback button {
            border: 0.5px solid var(--border-light);
            background: var(--bg-primary);
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 11px;
            cursor: pointer;
        }

        .voice-feedback button:hover {
            color: #0F6E56;
            border-color: rgba(29, 158, 117, 0.35);
        }

        .chat-input-wrap {
            border-top: 0.5px solid var(--border-light);
            padding: 10px 12px;
            background: var(--bg-primary);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            min-height: 40px;
            max-height: 120px;
            border: 0.5px solid var(--border-light);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
            resize: none;
            line-height: 1.45;
            font-family: inherit;
            overflow-y: auto;
        }

        .chat-input:focus {
            border-color: var(--border-mid);
        }

        .send-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bubble-user);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn svg { fill: var(--bubble-user-text); }

        .mic-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 0.5px solid var(--border-light);
            background: var(--bg-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mic-btn svg { width: 14px; height: 14px; fill: var(--text-secondary); }
        .mic-btn.listening { background: #b44b3a; border-color: #b44b3a; }
        .mic-btn.listening svg { fill: #ffffff; }

        .panel {
            width: var(--panel-width);
            flex-shrink: 0;
            border-left: 0.5px solid var(--border-light);
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-section {
            padding: 12px;
        }

        .panel-section + .panel-section {
            border-top: 0.5px solid var(--border-light);
        }

        .section-label {
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .sensor-row {
            display: flex;
            gap: 6px;
        }

        .sensor-card {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 8px 6px;
            text-align: center;
            border: 0.5px solid rgba(29, 158, 117, 0.08);
        }

        .sensor-label {
            font-size: 9px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sensor-val {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 2px;
            font-variant-numeric: tabular-nums;
        }

        .sensor-unit {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .entry-card {
            width: 100%;
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            background: var(--bg-secondary);
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.15s;
            margin-top: 8px;
        }

        .entry-card:first-of-type { margin-top: 0; }
        .entry-card:hover { background: var(--bg-tertiary); }

        .entry-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .entry-card-sub {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .entry-card-arrow {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .log-area {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 8px;
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: "SF Mono", Menlo, Consolas, monospace;
            line-height: 1.7;
            max-height: 160px;
            overflow-y: auto;
        }

        .log-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.38);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .overlay.open { display: flex; }

        .modal {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            border: 0.5px solid var(--border-light);
            width: 400px;
            max-height: 480px;
            overflow-y: auto;
            padding: 16px;
        }

        .modal.wide {
            width: 640px;
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .modal-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            cursor: pointer;
            font-size: 16px;
            color: var(--text-secondary);
            background: none;
            border: none;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rule-card,
        .info-card,
        .summary-card {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            padding: 10px 12px;
        }

        .rule-head,
        .summary-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .rule-name,
        .summary-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .rule-meta,
        .summary-meta,
        .info-text {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-top: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .mini-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .mini-btn {
            border: 0.5px solid var(--border-light);
            border-radius: 999px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 11px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .mini-btn:hover {
            border-color: rgba(29, 158, 117, 0.35);
            color: #0F6E56;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 10px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            border: 0.5px solid var(--border-light);
            white-space: nowrap;
        }

        .pill.on {
            background: var(--accent-bg);
            color: #0F6E56;
            border-color: rgba(29, 158, 117, 0.25);
        }

        .kv-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .kv-item {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            padding: 8px 10px;
        }

        .kv-label {
            font-size: 10px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .kv-value {
            font-size: 12px;
            color: var(--text-primary);
            margin-top: 4px;
            line-height: 1.45;
            word-break: break-word;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        .field label {
            font-size: 10px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .field input,
        .field select {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 12px;
            padding: 8px 10px;
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--border-mid);
        }

        .empty-hint {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .scene-card {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            background: var(--bg-primary);
        }

        .scene-card:hover { background: var(--bg-secondary); }
        .scene-card.active { border-color: var(--accent); background: var(--accent-bg); }

        .scene-card-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .scene-card-desc {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .device-card {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: var(--bg-primary);
        }

        .device-name {
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .device-status {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .toggle {
            width: 32px;
            height: 18px;
            border-radius: 9px;
            background: var(--border-light);
            position: relative;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .toggle.on { background: var(--accent); }

        .toggle::after {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.16);
        }

        .toggle.on::after { left: 16px; }

        .toast {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%) translateY(80px);
            padding: 10px 16px;
            background: rgba(44, 44, 42, 0.96);
            color: var(--bubble-user-text);
            font-size: 11px;
            border-radius: 999px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 20;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 980px) {
            body { padding: 0; }
            .app {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
        }

        @media (max-width: 760px) {
            .main { flex-direction: column; }
            .panel {
                width: 100%;
                border-left: none;
                border-top: 0.5px solid var(--border-light);
                max-height: 240px;
            }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="topbar">
            <div class="brand">
                <img class="brand-logo" src="homemind-logo.png" alt="HomeMind Logo">
                <div class="brand-copy">
                    <div class="brand-name">HomeMind</div>
                    <div class="brand-sub">智能家居中央指令器 · EST. 2024</div>
                </div>
            </div>
            <div class="topbar-right">
                <div class="status"><div class="dot"></div><span>系统在线</span></div>
                <div class="clock" id="clock">--:--:--</div>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-labels">
                <div class="progress-label" data-step="bsr">BSR 召回</div>
                <div class="progress-label" data-step="lsr">LSR 精排</div>
                <div class="progress-label" data-step="llm">LLM 决策</div>
                <div class="progress-label" data-step="exec">执行反馈</div>
            </div>
            <div class="progress-track">
                <div class="progress-step" data-step="bsr"></div>
                <div class="progress-step" data-step="lsr"></div>
                <div class="progress-step" data-step="llm"></div>
                <div class="progress-step" data-step="exec"></div>
            </div>
        </div>

        <div class="main">
            <div class="chat-col">
                <div class="chat-messages" id="messages">
                    <div class="msg system">
                        <div class="bubble">系统初始化完成，等待指令。您可以直接告诉我想执行什么，我会帮您协调家居设备。</div>
                        <div class="msg-time" id="boot-time">--:--:--</div>
                    </div>
                </div>

                <div class="chat-input-wrap">
                    <textarea class="chat-input" id="inputBox" rows="1" placeholder="告诉我你想要什么…" onkeydown="handleKey(event)"></textarea>
                    <button class="mic-btn" id="mic-btn" onclick="toggleVoiceInput()" title="语音输入">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                    <button class="send-btn" onclick="submitQuery()" title="发送">
                        <svg width="14" height="14" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 14L14 8 2 2v4.5l8 1.5-8 1.5z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-section">
                    <div class="section-label">传感器数据</div>
                    <div class="sensor-row">
                        <div class="sensor-card">
                            <div class="sensor-label">Temp</div>
                            <div class="sensor-val"><span id="current-temp">--</span><span class="sensor-unit">°C</span></div>
                        </div>
                        <div class="sensor-card">
                            <div class="sensor-label">Hum</div>
                            <div class="sensor-val"><span id="current-humidity">--</span><span class="sensor-unit">%</span></div>
                        </div>
                        <div class="sensor-card">
                            <div class="sensor-label">人数</div>
                            <div class="sensor-val"><span id="current-occupancy">--</span><span class="sensor-unit">人</span></div>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <div class="section-label">快捷入口</div>
                    <button class="entry-card" onclick="openModal('scene')">
                        <div>
                            <div class="entry-card-title">场景模式</div>
                            <div class="entry-card-sub">睡眠 · 观影 · 工作…</div>
                        </div>
                        <span class="entry-card-arrow">›</span>
                    </button>
                    <button class="entry-card" onclick="openModal('device')">
                        <div>
                            <div class="entry-card-title">设备控制</div>
                            <div class="entry-card-sub">空调 · 灯光 · 电视…</div>
                        </div>
                        <span class="entry-card-arrow">›</span>
                    </button>
                    <button class="entry-card" onclick="openModal('rules')">
                        <div>
                            <div class="entry-card-title">自动化规则</div>
                            <div class="entry-card-sub">查看 · 新建 · 启停 · 执行</div>
                        </div>
                        <span class="entry-card-arrow">›</span>
                    </button>
                    <button class="entry-card" onclick="openModal('memory')">
                        <div>
                            <div class="entry-card-title">记忆与偏好</div>
                            <div class="entry-card-sub">上下文 · 长期偏好 · 近期记忆</div>
                        </div>
                        <span class="entry-card-arrow">›</span>
                    </button>
                    <button class="entry-card" onclick="openModal('privacy')">
                        <div>
                            <div class="entry-card-title">隐私与云调用</div>
                            <div class="entry-card-sub">路由结果 · 上传摘要 · 本地兜底</div>
                        </div>
                        <span class="entry-card-arrow">›</span>
                    </button>
                </div>

                <div class="panel-section">
                    <div class="section-label">操作日志</div>
                    <div class="log-area" id="log">
                        <div class="log-line">--:--:--  系统 → 初始化完成</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="overlay" id="overlay" onclick="closeModal(event)">
            <div class="modal">
                <div class="modal-head">
                    <span class="modal-title" id="modalTitle"></span>
                    <button class="modal-close" onclick="closeOverlay()">✕</button>
                </div>
                <div id="modalBody"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        const scenes = [
            { id: "sleep", name: "睡眠模式", desc: "关闭灯光、调节温度、安防布控" },
            { id: "entertainment", name: "观影模式", desc: "调暗灯光、启动电视、音响就绪" },
            { id: "work", name: "工作模式", desc: "明亮环境、关闭娱乐设备" },
            { id: "away", name: "离家模式", desc: "全关设备、安防启动" },
            { id: "morning", name: "早安模式", desc: "窗帘打开、轻柔音乐、温度适宜" },
            { id: "evening", name: "晚归模式", desc: "门廊亮起、室温预调、氛围灯光" }
        ];

        const deviceList = [
            { id: "air_conditioner", name: "空调" },
            { id: "light", name: "灯光" },
            { id: "tv", name: "电视" },
            { id: "water_heater", name: "热水器" },
            { id: "fan", name: "风扇" },
            { id: "speaker", name: "音响" },
            { id: "window", name: "窗户" }
        ];

        const progressOrder = ["bsr", "lsr", "llm", "exec"];
        let socket = null;
        let devices = {};
        let currentScene = "sleep";
        let activePipeline = null;
        let recognition = null;
        let isListening = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let lastVoiceResult = null;
        let toastTimer = null;
        let currentModal = null;
        let rulesCache = [];
        let memorySnapshot = null;
        let privacySnapshot = null;
        let schedulerSnapshot = null;

        async function apiGet(url) {
            const response = await fetch(url);
            return response.json();
        }

        async function apiJson(url, method = "POST", body = {}) {
            const response = await fetch(url, {
                method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            return response.json();
        }

        function pad(n) { return String(n).padStart(2, "0"); }

        function getTime() {
            const d = new Date();
            return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
        }

        function tick() {
            document.getElementById("clock").textContent = getTime();
        }

        function autoResize() {
            const box = document.getElementById("inputBox");
            box.style.height = "40px";
            box.style.height = Math.min(box.scrollHeight, 120) + "px";
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");
        }

        function addMsg(role, html, tag) {
            const el = document.createElement("div");
            el.className = "msg " + role;
            el.innerHTML = `
                <div class="bubble">
                    ${escapeHtml(html)}
                    ${tag ? `<span class="action-tag">${tag}</span>` : ""}
                </div>
                <div class="msg-time">${getTime()}</div>
            `;
            const msgs = document.getElementById("messages");
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addVoiceFeedbackMsg(data) {
            lastVoiceResult = data;
            const el = document.createElement("div");
            el.className = "msg system";
            const asrText = escapeHtml(data.text || "");
            const normalized = escapeHtml(data.normalized || data.text || "");
            el.innerHTML = `
                <div class="bubble">
                    语音识别：${asrText}<br>
                    归一化：${normalized}
                    <div class="voice-feedback">
                        <button onclick="sendVoiceFeedback('accepted')">正确</button>
                        <button onclick="sendVoiceFeedback('corrected')">纠正</button>
                        <button onclick="sendVoiceFeedback('ignored')">忽略</button>
                    </div>
                </div>
                <div class="msg-time">${getTime()}</div>
            `;
            const msgs = document.getElementById("messages");
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addLog(subject, status) {
            const log = document.getElementById("log");
            const line = document.createElement("div");
            line.className = "log-line";
            line.textContent = `${getTime()}  ${subject} → ${status}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("visible");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove("visible"), 2800);
        }

        function resetProgress() {
            progressOrder.forEach((step) => setProgressState(step, "wait"));
        }

        function setProgressState(step, state) {
            const label = document.querySelector(`.progress-label[data-step="${step}"]`);
            const bar = document.querySelector(`.progress-step[data-step="${step}"]`);
            [label, bar].forEach((el) => {
                if (!el) return;
                el.classList.remove("done", "active", "error");
                if (state !== "wait") {
                    el.classList.add(state);
                }
            });
        }

        function buildDeviceStatus(deviceId, state) {
            if (!state || !state.is_on) {
                return "关闭";
            }
            if (deviceId === "air_conditioner" && state.temperature !== undefined) {
                return `${state.temperature}°C`;
            }
            if (deviceId === "light" && state.brightness !== undefined) {
                return `亮度 ${state.brightness}%`;
            }
            return "开启";
        }

        function getDeviceName(id) {
            const match = deviceList.find((item) => item.id === id);
            return match ? match.name : id;
        }

        function getSceneName(id) {
            const match = scenes.find((item) => item.id === id);
            return match ? match.name : id;
        }

        function updateContext(ctx) {
            document.getElementById("current-temp").textContent = ctx.temperature ?? "--";
            document.getElementById("current-humidity").textContent = ctx.humidity ?? "--";
            document.getElementById("current-occupancy").textContent = ctx.occupancy ?? "--";
            if (ctx.scene) {
                currentScene = ctx.scene;
            }
            if (currentModal) {
                renderModal(currentModal);
            }
        }

        function updateDeviceState(id, state) {
            devices[id] = state || {};
            if (currentModal === "device") {
                renderModal("device");
            }
        }

        function updateDevices(states) {
            Object.entries(states || {}).forEach(([id, state]) => updateDeviceState(id, state));
        }

        function sendQuery(query) {
            socket.emit("user_input", { text: query });
        }

        function submitQuery() {
            const box = document.getElementById("inputBox");
            const val = box.value.trim();
            if (!val) return;
            addMsg("user", val);
            addLog("用户", val);
            sendQuery(val);
            box.value = "";
            autoResize();
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                submitQuery();
            } else {
                setTimeout(autoResize, 0);
            }
        }

        function openModal(type) {
            currentModal = type;
            const modal = document.querySelector(".modal");
            modal.classList.toggle("wide", ["rules", "memory", "privacy"].includes(type));
            renderModal(type);
            document.getElementById("overlay").classList.add("open");
            if (type === "rules") loadRules();
            if (type === "rules") loadSchedulerStatus();
            if (type === "memory") loadMemorySummary();
            if (type === "privacy") loadPrivacyStatus();
        }

        function renderModal(type) {
            const title = document.getElementById("modalTitle");
            const body = document.getElementById("modalBody");
            if (type === "scene") {
                title.textContent = "场景模式";
                body.innerHTML = `<div class="card-grid">${
                    scenes.map((scene) => `
                        <div class="scene-card ${currentScene === scene.id ? "active" : ""}" data-scene-id="${scene.id}">
                            <div class="scene-card-name">${scene.name}</div>
                            <div class="scene-card-desc">${scene.desc}</div>
                        </div>
                    `).join("")
                }</div>`;
                body.querySelectorAll(".scene-card").forEach((card) => {
                    card.addEventListener("click", () => {
                        const sceneId = card.dataset.sceneId;
                        switchScene(sceneId);
                        closeOverlay();
                    });
                });
            } else {
                title.textContent = "设备控制";
                body.innerHTML = `<div class="card-grid">${
                    deviceList.map((device) => {
                        const state = devices[device.id] || {};
                        return `
                            <div class="device-card">
                                <div>
                                    <div class="device-name">${device.name}</div>
                                    <div class="device-status">${buildDeviceStatus(device.id, state)}</div>
                                </div>
                                <button class="toggle ${state.is_on ? "on" : ""}" data-device-id="${device.id}"></button>
                            </div>
                        `;
                    }).join("")
                }</div>`;
                body.querySelectorAll(".toggle").forEach((toggle) => {
                    toggle.addEventListener("click", () => {
                        const id = toggle.dataset.deviceId;
                        const state = devices[id] || {};
                        controlDevice(id, state.is_on ? "off" : "on");
                    });
                });
            } else if (type === "rules") {
                title.textContent = "自动化规则";
                const rules = rulesCache || [];
                const scheduler = schedulerSnapshot || {};
                body.innerHTML = `
                    <div class="summary-card">
                        <div class="summary-head">
                            <div>
                                <div class="summary-title">新建规则</div>
                                <div class="summary-meta">支持时间、高温、人数触发；动作可切场景或控设备。</div>
                            </div>
                            <button class="mini-btn" id="refresh-rules-btn">刷新</button>
                        </div>
                        <div class="mini-actions">
                            <span class="pill ${scheduler.enabled ? "on" : ""}">${scheduler.enabled ? "自动调度中" : "自动调度已停用"}</span>
                            <button class="mini-btn" id="toggle-scheduler-btn">${scheduler.enabled ? "暂停自动调度" : "启用自动调度"}</button>
                        </div>
                        <div class="form-grid">
                            <div class="field">
                                <label>规则名</label>
                                <input id="rule-name" placeholder="例如：夜间睡眠">
                            </div>
                            <div class="field">
                                <label>优先级</label>
                                <input id="rule-priority" type="number" value="10">
                            </div>
                            <div class="field">
                                <label>触发类型</label>
                                <select id="rule-trigger-type">
                                    <option value="time">时间</option>
                                    <option value="temperature">温度</option>
                                    <option value="occupancy">人数</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>触发值</label>
                                <input id="rule-trigger-value" placeholder="22:30 或 30">
                            </div>
                            <div class="field">
                                <label>动作类型</label>
                                <select id="rule-action-type">
                                    <option value="scene_switch">场景切换</option>
                                    <option value="device_control">设备控制</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>动作目标</label>
                                <input id="rule-action-target" placeholder="睡眠模式 或 空调">
                            </div>
                            <div class="field">
                                <label>设备动作</label>
                                <select id="rule-device-action">
                                    <option value="on">on</option>
                                    <option value="off">off</option>
                                    <option value="adjust">adjust</option>
                                    <option value="open">open</option>
                                    <option value="close">close</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>参数值</label>
                                <input id="rule-param-value" placeholder="温度/亮度，可空">
                            </div>
                            <div class="field full">
                                <button class="mini-btn" id="create-rule-btn">保存规则</button>
                            </div>
                        </div>
                    </div>
                    <div class="stack" id="rules-list">
                        ${rules.length ? rules.map((rule) => `
                            <div class="rule-card">
                                <div class="rule-head">
                                    <div>
                                        <div class="rule-name">${rule.name}</div>
                                        <div class="rule-meta">触发：${formatRuleTrigger(rule.trigger)} ｜ 动作：${formatRuleAction(rule.action)}</div>
                                    </div>
                                    <span class="pill ${rule.enabled ? "on" : ""}">${rule.enabled ? "已启用" : "已停用"}</span>
                                </div>
                                <div class="mini-actions">
                                    <button class="mini-btn" data-rule-toggle="${rule.id}">${rule.enabled ? "停用" : "启用"}</button>
                                    <button class="mini-btn" data-rule-run="${rule.id}">评估</button>
                                    <button class="mini-btn" data-rule-delete="${rule.id}">删除</button>
                                </div>
                            </div>
                        `).join("") : `<div class="empty-hint">还没有自动化规则。</div>`}
                    </div>
                `;
                document.getElementById("refresh-rules-btn").onclick = loadRules;
                document.getElementById("toggle-scheduler-btn").onclick = toggleScheduler;
                document.getElementById("create-rule-btn").onclick = createRuleFromForm;
                body.querySelectorAll("[data-rule-toggle]").forEach((btn) => {
                    btn.onclick = () => toggleRule(btn.dataset.ruleToggle);
                });
                body.querySelectorAll("[data-rule-delete]").forEach((btn) => {
                    btn.onclick = () => deleteRule(btn.dataset.ruleDelete);
                });
                body.querySelectorAll("[data-rule-run]").forEach((btn) => {
                    btn.onclick = () => runSingleRule(btn.dataset.ruleRun);
                });
            } else if (type === "memory") {
                title.textContent = "记忆与偏好";
                const snapshot = memorySnapshot || {};
                const session = snapshot.session || {};
                const prefs = snapshot.preferences || {};
                const turns = session.recent_turns || [];
                const recentMemory = snapshot.recent_memory || [];
                body.innerHTML = `
                    <div class="kv-grid">
                        <div class="kv-item">
                            <div class="kv-label">当前场景</div>
                            <div class="kv-value">${session.current_scene || "暂无"}</div>
                        </div>
                        <div class="kv-item">
                            <div class="kv-label">最近输入</div>
                            <div class="kv-value">${session.last_user_input || "暂无"}</div>
                        </div>
                        <div class="kv-item">
                            <div class="kv-label">归一化结果</div>
                            <div class="kv-value">${session.last_normalized_input || "暂无"}</div>
                        </div>
                        <div class="kv-item">
                            <div class="kv-label">最近动作</div>
                            <div class="kv-value">${formatLastAction(session.last_action || {})}</div>
                        </div>
                    </div>
                    <div class="summary-card" style="margin-top: 10px;">
                        <div class="summary-title">结构化偏好</div>
                        <div class="summary-meta">${formatPreferences(prefs)}</div>
                    </div>
                    <div class="summary-card" style="margin-top: 10px;">
                        <div class="summary-title">近期交互</div>
                        <div class="stack" style="margin-top: 8px;">
                            ${turns.length ? turns.map((turn) => `
                                <div class="info-card">
                                    <div class="info-text">${turn.role} · ${turn.text}</div>
                                </div>
                            `).join("") : `<div class="empty-hint">暂无近期交互。</div>`}
                        </div>
                    </div>
                    <div class="summary-card" style="margin-top: 10px;">
                        <div class="summary-title">近期记忆写回</div>
                        <div class="stack" style="margin-top: 8px;">
                            ${recentMemory.length ? recentMemory.map((item) => `
                                <div class="info-card">
                                    <div class="info-text">${item.category || "记忆"} · ${item.content || ""}</div>
                                </div>
                            `).join("") : `<div class="empty-hint">暂无近期记忆。</div>`}
                        </div>
                    </div>
                `;
            } else if (type === "privacy") {
                title.textContent = "隐私与云调用";
                const info = privacySnapshot || {};
                const context = info.last_cloud_context || {};
                body.innerHTML = `
                    <div class="kv-grid">
                        <div class="kv-item">
                            <div class="kv-label">云端可用</div>
                            <div class="kv-value">${info.cloud_enabled ? "是" : "否"}</div>
                        </div>
                        <div class="kv-item">
                            <div class="kv-label">LLM 后端</div>
                            <div class="kv-value">${info.llm_backend || "mock"}</div>
                        </div>
                        <div class="kv-item">
                            <div class="kv-label">最近路由</div>
                            <div class="kv-value">${info.last_route || "local"}</div>
                        </div>
                        <div class="kv-item">
                            <div class="kv-label">路由原因</div>
                            <div class="kv-value">${info.last_route_reason || "暂无"}</div>
                        </div>
                    </div>
                    <div class="summary-card" style="margin-top: 10px;">
                        <div class="summary-title">最小必要上传字段</div>
                        <div class="summary-meta">${(info.minimal_fields || []).join(" / ") || "暂无"}</div>
                    </div>
                    <div class="summary-card" style="margin-top: 10px;">
                        <div class="summary-title">最近一次云端摘要</div>
                        <div class="summary-meta">${formatJson(context)}</div>
                    </div>
                `;
            }
        }

        function switchScene(scene) {
            socket.emit("message", { type: "scene_switch", data: { scene } });
            currentScene = scene;
            addLog("场景", getSceneName(scene));
        }

        function controlDevice(deviceId, action) {
            socket.emit("message", { type: "device_control", data: { device: deviceId, action, params: {} } });
        }

        function closeModal(e) {
            if (e.target === document.getElementById("overlay")) {
                closeOverlay();
            }
        }

        function closeOverlay() {
            document.getElementById("overlay").classList.remove("open");
            document.querySelector(".modal").classList.remove("wide");
            currentModal = null;
        }

        function formatRuleTrigger(trigger = {}) {
            if (trigger.type === "time") return `时间 ${trigger.at || "--:--"}`;
            if (trigger.type === "temperature") return `温度 ${trigger.op || ">"} ${trigger.value ?? "-"}`;
            if (trigger.type === "occupancy") return `人数 ${trigger.op || ">"} ${trigger.value ?? "-"}`;
            if (trigger.type === "scene") return `场景 = ${trigger.equals || "-"}`;
            return "未配置";
        }

        function formatRuleAction(action = {}) {
            if (action.type === "scene_switch") return `切换到 ${action.scene || "-"}`;
            if (action.type === "device_control") return `${action.device || "-"} ${action.device_action || "-"}`;
            return action.type || "未配置";
        }

        function formatLastAction(action = {}) {
            if (!action || !Object.keys(action).length) return "暂无";
            if (action.scene) return `${action.type || "场景切换"} · ${action.scene}`;
            if (action.device) return `${action.type || "设备控制"} · ${action.device} ${action.device_action || ""}`.trim();
            return action.type || "暂无";
        }

        function formatPreferences(prefs = {}) {
            const devicesPref = prefs.devices || {};
            const scenesPref = prefs.scenes || {};
            const parts = [];
            if (devicesPref["空调"]?.preferred_temperature !== undefined) {
                parts.push(`空调偏好 ${devicesPref["空调"].preferred_temperature}°C`);
            }
            if (devicesPref["灯光"]?.preferred_brightness !== undefined) {
                parts.push(`灯光偏好亮度 ${devicesPref["灯光"].preferred_brightness}%`);
            }
            const favoriteScene = Object.entries(scenesPref).sort((a, b) => (b[1].accept_count || 0) - (a[1].accept_count || 0))[0];
            if (favoriteScene) {
                parts.push(`常用场景 ${favoriteScene[0]}`);
            }
            return parts.length ? parts.join("；") : "暂无稳定偏好。";
        }

        function formatJson(value) {
            try {
                return JSON.stringify(value || {}, null, 2);
            } catch (e) {
                return "{}";
            }
        }

        async function loadRules() {
            try {
                const data = await apiGet("/api/rules");
                rulesCache = data.rules || [];
                if (currentModal === "rules") renderModal("rules");
            } catch (e) {
                showToast("规则加载失败");
            }
        }

        async function loadSchedulerStatus() {
            try {
                schedulerSnapshot = await apiGet("/api/rules/scheduler");
                if (currentModal === "rules") renderModal("rules");
            } catch (e) {
                showToast("调度器状态加载失败");
            }
        }

        async function loadMemorySummary() {
            try {
                memorySnapshot = await apiGet("/api/memory/summary");
                if (currentModal === "memory") renderModal("memory");
            } catch (e) {
                showToast("记忆摘要加载失败");
            }
        }

        async function loadPrivacyStatus() {
            try {
                privacySnapshot = await apiGet("/api/privacy/status");
                if (currentModal === "privacy") renderModal("privacy");
            } catch (e) {
                showToast("隐私状态加载失败");
            }
        }

        async function createRuleFromForm() {
            const triggerType = document.getElementById("rule-trigger-type").value;
            const triggerValue = document.getElementById("rule-trigger-value").value.trim();
            const actionType = document.getElementById("rule-action-type").value;
            const actionTarget = document.getElementById("rule-action-target").value.trim();
            const paramValue = document.getElementById("rule-param-value").value.trim();
            const rule = {
                name: document.getElementById("rule-name").value.trim() || "未命名规则",
                enabled: true,
                priority: Number(document.getElementById("rule-priority").value || 10),
                trigger: buildTrigger(triggerType, triggerValue),
                conditions: [],
                action: buildRuleAction(actionType, actionTarget, document.getElementById("rule-device-action").value, paramValue)
            };
            try {
                const data = await apiJson("/api/rules", "POST", rule);
                if (data.status !== "success") {
                    showToast(data.error || "规则创建失败");
                    return;
                }
                showToast("规则已保存");
                await loadRules();
            } catch (e) {
                showToast("规则创建失败");
            }
        }

        function buildTrigger(type, rawValue) {
            if (type === "time") return { type: "time", at: rawValue || "22:30" };
            if (type === "temperature") return { type: "temperature", op: ">", value: Number(rawValue || 30) };
            if (type === "occupancy") return { type: "occupancy", op: ">", value: Number(rawValue || 0) };
            return { type: "time", at: "22:30" };
        }

        function buildRuleAction(type, target, deviceAction, paramValue) {
            if (type === "scene_switch") {
                return { type: "scene_switch", scene: target || "睡眠模式" };
            }
            const action = {
                type: "device_control",
                device: target || "空调",
                device_action: deviceAction || "on",
                params: {}
            };
            if (paramValue) {
                const value = Number(paramValue);
                if ((target || "").includes("灯")) action.params.brightness = value;
                else action.params.temperature = value;
            }
            return action;
        }

        async function toggleRule(ruleId) {
            try {
                const data = await apiJson(`/api/rules/${ruleId}/toggle`, "POST", {});
                if (data.status !== "success") {
                    showToast(data.error || "规则切换失败");
                    return;
                }
                await loadRules();
            } catch (e) {
                showToast("规则切换失败");
            }
        }

        async function toggleScheduler() {
            const enabled = !(schedulerSnapshot && schedulerSnapshot.enabled);
            try {
                const data = await apiJson("/api/rules/scheduler", "POST", { enabled });
                if (data.status !== "success") {
                    showToast(data.error || "调度器切换失败");
                    return;
                }
                schedulerSnapshot = data;
                showToast(enabled ? "自动调度已启用" : "自动调度已暂停");
                if (currentModal === "rules") renderModal("rules");
            } catch (e) {
                showToast("调度器切换失败");
            }
        }

        async function deleteRule(ruleId) {
            try {
                const response = await fetch(`/api/rules/${ruleId}`, { method: "DELETE" });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.error || "规则删除失败");
                    return;
                }
                showToast("规则已删除");
                await loadRules();
            } catch (e) {
                showToast("规则删除失败");
            }
        }

        async function runSingleRule(ruleId) {
            const rule = (rulesCache || []).find((item) => item.id === ruleId);
            if (!rule) return;
            const payload = {
                execute: true,
                context: {
                    temperature: Number(document.getElementById("current-temp").textContent || 25),
                    humidity: Number(document.getElementById("current-humidity").textContent || 60),
                    members_home: Number(document.getElementById("current-occupancy").textContent || 1),
                    current_scene: currentScene
                }
            };
            if (rule.trigger?.type === "time") {
                payload.time = rule.trigger.at || "22:30";
            }
            try {
                const data = await apiJson("/api/rules/evaluate", "POST", payload);
                if (data.status !== "success") {
                    showToast(data.error || "规则评估失败");
                    return;
                }
                const hit = (data.matches || []).find((item) => item.rule?.id === ruleId);
                if (!hit) {
                    showToast("当前上下文下未命中该规则");
                    return;
                }
                if (hit.execution?.status === "success") {
                    showToast("规则已执行");
                    loadStatus();
                } else {
                    showToast(hit.execution?.status || "规则命中但未执行");
                }
            } catch (e) {
                showToast("规则评估失败");
            }
        }

        async function initVoiceRecognition() {
            if (!navigator.mediaDevices || !window.MediaRecorder) {
                showToast("当前浏览器不支持录音上传");
            }
        }

        async function toggleVoiceInput() {
            if (!navigator.mediaDevices || !window.MediaRecorder) {
                showToast("当前浏览器不支持录音上传");
                return;
            }
            if (isListening) {
                mediaRecorder.stop();
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                mediaRecorder.onstop = async () => {
                    isListening = false;
                    document.getElementById("mic-btn").classList.remove("listening");
                    stream.getTracks().forEach((track) => track.stop());
                    await uploadVoiceRecording();
                };
                mediaRecorder.start();
                isListening = true;
                document.getElementById("mic-btn").classList.add("listening");
                showToast("正在录音，再点一次结束");
            } catch (e) {
                showToast("无法访问麦克风");
            }
        }

        async function uploadVoiceRecording() {
            if (!audioChunks.length) {
                showToast("没有录到声音");
                return;
            }
            const mimeType = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : "audio/webm";
            const blob = new Blob(audioChunks, { type: mimeType });
            const form = new FormData();
            form.append("audio", blob, mimeType.includes("wav") ? "voice.wav" : "voice.webm");
            form.append("lang", "auto");
            showToast("正在本地识别语音");
            try {
                const response = await fetch("/api/voice/transcribe", {
                    method: "POST",
                    body: form
                });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.hint || data.error || "语音识别失败");
                    return;
                }
                const text = data.normalized || data.text || "";
                if (!text) {
                    showToast("没有识别到有效指令");
                    return;
                }
                document.getElementById("inputBox").value = text;
                autoResize();
                addLog("语音", data.text || text);
                addVoiceFeedbackMsg(data);
                submitQuery();
            } catch (e) {
                showToast("语音上传失败");
            }
        }

        async function sendVoiceFeedback(feedback) {
            if (!lastVoiceResult) {
                showToast("没有可反馈的语音记录");
                return;
            }
            let correctedText = "";
            let correctedNormalized = "";
            if (feedback === "corrected") {
                correctedText = window.prompt("请输入正确的识别文本或标准指令", lastVoiceResult.normalized || lastVoiceResult.text || "") || "";
                correctedText = correctedText.trim();
                if (!correctedText) {
                    showToast("已取消纠正");
                    return;
                }
            }
            try {
                const response = await fetch("/api/voice/feedback", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        asr_text: lastVoiceResult.text || "",
                        normalized: lastVoiceResult.normalized || "",
                        corrected_text: correctedText,
                        corrected_normalized: correctedNormalized,
                        language: lastVoiceResult.language || "unknown",
                        confidence: lastVoiceResult.confidence || 0,
                        engine: lastVoiceResult.engine || "vosk",
                        feedback
                    })
                });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.error || "反馈记录失败");
                    return;
                }
                showToast("语音反馈已记入历史");
            } catch (e) {
                showToast("反馈提交失败");
            }
        }

        function handlePipelineUpdate(msg) {
            const { type, data } = msg;
            if (type === "pipeline_start") {
                activePipeline = data.steps || {};
                resetProgress();
                setProgressState("bsr", "active");
                return;
            }
            if (type === "pipeline_error") {
                progressOrder.forEach((step) => setProgressState(step, "error"));
                activePipeline = null;
                return;
            }
            if (type !== "pipeline_step" || !data.step) {
                return;
            }
            activePipeline = activePipeline || {};
            activePipeline[data.step] = data.data || {};
            const currentIndex = progressOrder.indexOf(data.step);
            progressOrder.forEach((step, index) => {
                if (index < currentIndex || index === currentIndex) {
                    setProgressState(step, "done");
                } else if (index === currentIndex + 1) {
                    setProgressState(step, "active");
                } else {
                    setProgressState(step, "wait");
                }
            });
            if (data.step === "exec") {
                activePipeline = null;
            }
        }

        function handleMessage(msg) {
            const { type, data } = msg;
            switch (type) {
                case "connected":
                    updateContext(data.context || {});
                    updateDevices(data.devices || {});
                    loadRules();
                    loadMemorySummary();
                    loadPrivacyStatus();
                    break;
                case "agent_response":
                    addMsg("ai", data.result, "执行完成");
                    addLog("系统", data.result);
                    loadStatus();
                    loadMemorySummary();
                    loadPrivacyStatus();
                    break;
                case "automation_update":
                    addMsg("system", `${data.rule || "自动化规则"}：${data.result || "已执行"}`, "自动触发");
                    addLog("自动化", `${data.rule || "规则"} → ${data.result || "已执行"}`);
                    loadStatus();
                    loadMemorySummary();
                    break;
                case "agent_clarification":
                    addMsg("ai", data.question, "需要澄清");
                    addLog("系统", data.question);
                    loadPrivacyStatus();
                    break;
                case "device_update":
                    updateDeviceState(data.device, data.state);
                    addLog(getDeviceName(data.device), buildDeviceStatus(data.device, data.state));
                    break;
                case "scene_update":
                    currentScene = data.scene;
                    updateDevices(data.devices || {});
                    addLog("场景", getSceneName(data.scene));
                    if (currentModal === "scene") {
                        renderModal("scene");
                    }
                    break;
                default:
                    break;
            }
        }

        function initWebSocket() {
            socket = io("http://localhost:5000");
            socket.on("connect", () => addLog("系统", "连接已建立"));
            socket.on("disconnect", () => addLog("系统", "连接已断开"));
            socket.on("message", handleMessage);
            socket.on("pipeline_update", handlePipelineUpdate);
        }

        function loadStatus() {
            fetch("http://localhost:5000/api/status")
                .then((r) => r.json())
                .then((data) => {
                    updateContext(data.context || {});
                    updateDevices(data.devices || {});
                })
                .catch(() => showToast("加载状态失败"));
        }

        document.addEventListener("DOMContentLoaded", () => {
            tick();
            setInterval(tick, 1000);
            document.getElementById("boot-time").textContent = getTime();
            resetProgress();
            autoResize();
            initVoiceRecognition();
            initWebSocket();
            loadStatus();
            loadRules();
            loadSchedulerStatus();
            loadMemorySummary();
            loadPrivacyStatus();
        });
    </script>
</body>
</html>
