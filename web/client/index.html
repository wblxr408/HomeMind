<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeMind — 智能家居中央指令器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f4f0;
            --bg-tertiary: #eeece7;
            --text-primary: #1a1a18;
            --text-secondary: #5a5a56;
            --text-tertiary: #9a9994;
            --border-light: rgba(0, 0, 0, 0.10);
            --border-mid: rgba(0, 0, 0, 0.15);
            --accent: #1D9E75;
            --accent-light: #5DCAA5;
            --accent-bg: #E1F5EE;
            --bubble-user: #2C2C2A;
            --bubble-user-text: #F1EFE8;
            --radius-md: 8px;
            --radius-lg: 12px;
            --panel-width: 380px;
            --progress-height: 2px;
            --progress-label-size: 9px;
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background: var(--bg-tertiary);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .app {
            display: flex;
            flex-direction: column;
            width: 100vw;
            min-height: 100vh;
            height: 100vh;
            background: var(--bg-tertiary);
            background-image:
                radial-gradient(circle at top, rgba(29, 158, 117, 0.10), transparent 26%),
                linear-gradient(180deg, #f3f1eb 0%, #ebe7e0 100%);
            border-radius: 0;
            overflow: hidden;
            border: none;
            box-shadow: none;
            position: relative;
        }

        .topbar {
            background: var(--bg-primary);
            border-bottom: 0.5px solid var(--border-light);
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-logo {
            width: 52px;
            height: 52px;
            object-fit: contain;
            flex-shrink: 0;
            display: block;
        }

        .brand-copy {
            min-width: 0;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 1px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            box-shadow: 0 0 0 6px rgba(29, 158, 117, 0.10);
            animation: pulse 2s infinite;
        }

        .clock {
            font-size: 12px;
            color: var(--text-tertiary);
            font-variant-numeric: tabular-nums;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        .progress-wrap {
            flex-shrink: 0;
            background: var(--bg-primary);
            border-bottom: 0.5px solid var(--border-light);
            padding: 5px 18px 6px;
        }

        .progress-labels {
            display: flex;
            margin-bottom: 4px;
        }

        .progress-label {
            flex: 1;
            font-size: var(--progress-label-size);
            color: var(--text-tertiary);
            text-align: center;
            line-height: 1.2;
        }

        .progress-label.done { color: var(--text-secondary); }
        .progress-label.active { color: #0F6E56; }
        .progress-label.error { color: #b44b3a; }

        .progress-track {
            height: var(--progress-height);
            display: flex;
            gap: 2px;
            border-radius: 1px;
            overflow: hidden;
        }

        .progress-step {
            flex: 1;
            background: var(--border-light);
            border-radius: 1px;
        }

        .progress-step.done { background: var(--accent); }
        .progress-step.active { background: var(--accent-light); }
        .progress-step.error { background: #d97f6c; }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .chat-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(245,244,240,0.7) 100%);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 76%;
        }

        .msg.user { align-self: flex-end; align-items: flex-end; }
        .msg.ai, .msg.system { align-self: flex-start; align-items: flex-start; }

        .bubble {
            display: inline-block;
            width: fit-content;
            max-width: 100%;
            padding: 6px 9px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.38;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 4px;
        }

        .msg.ai .bubble,
        .msg.system .bubble {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 0.5px solid var(--border-light);
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 1px;
            padding: 0 2px;
        }

        .action-tag {
            display: inline-block;
            margin-top: 6px;
            font-size: 11px;
            color: #0F6E56;
            background: var(--accent-bg);
            padding: 2px 7px;
            border-radius: 4px;
        }

        .voice-feedback {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .voice-feedback button {
            border: 0.5px solid var(--border-light);
            background: var(--bg-primary);
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 11px;
            cursor: pointer;
        }

        .voice-feedback button:hover {
            color: #0F6E56;
            border-color: rgba(29, 158, 117, 0.35);
        }

        .chat-input-wrap {
            border-top: 0.5px solid var(--border-light);
            padding: 10px 12px;
            background: var(--bg-primary);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            min-height: 40px;
            max-height: 120px;
            border: 0.5px solid var(--border-light);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
            resize: none;
            line-height: 1.45;
            font-family: inherit;
            overflow-y: auto;
        }

        .chat-input:focus {
            border-color: var(--border-mid);
        }

        .send-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bubble-user);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn svg { fill: var(--bubble-user-text); }

        .mic-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 0.5px solid var(--border-light);
            background: var(--bg-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mic-btn svg { width: 14px; height: 14px; fill: var(--text-secondary); }
        .mic-btn.listening { background: #b44b3a; border-color: #b44b3a; }
        .mic-btn.listening svg { fill: #ffffff; }

        .panel {
            width: var(--panel-width);
            flex-shrink: 0;
            border-left: 0.5px solid var(--border-light);
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-section {
            padding: 9px 10px;
        }

        .panel-section + .panel-section {
            border-top: 0.5px solid var(--border-light);
        }

        .section-label {
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .sensor-row {
            display: flex;
            gap: 5px;
        }

        .sensor-card {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 7px 5px;
            text-align: center;
            border: 0.5px solid rgba(29, 158, 117, 0.08);
        }

        .sensor-label {
            font-size: 9px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sensor-val {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 2px;
            font-variant-numeric: tabular-nums;
        }

        .sensor-unit {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .entry-card {
            width: 100%;
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            background: var(--bg-secondary);
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.15s;
            margin-top: 8px;
        }

        .entry-card:first-of-type { margin-top: 0; }
        .entry-card:hover { background: var(--bg-tertiary); }

        .entry-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .entry-card-sub {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .entry-card-arrow {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .scene-quick-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .scene-quick-btn {
            appearance: none;
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 8px 9px;
            text-align: left;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .scene-quick-btn.active {
            border-color: var(--accent);
            background: var(--accent-bg);
        }

        .scene-quick-name {
            font-size: 12px;
            font-weight: 600;
        }

        .scene-quick-desc {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
            line-height: 1.4;
        }

        .quick-device-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .quick-device-card {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 8px 9px;
            background: rgba(255,255,255,0.78);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .quick-device-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .quick-device-status {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .spatial-quick {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .spatial-quick-meta {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .spatial-quick-toolbar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .spatial-quick-plan-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 84px;
            overflow-y: auto;
        }

        .spatial-quick-plan {
            border: 0.5px solid var(--border-light);
            border-radius: 10px;
            background: var(--bg-secondary);
            padding: 8px 10px;
            cursor: pointer;
        }

        .spatial-quick-plan.active {
            border-color: var(--accent);
            background: var(--accent-bg);
        }

        .spatial-quick-plan-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .spatial-quick-plan-meta {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .spatial-quick-preview {
            position: relative;
            min-height: 126px;
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(241,247,244,0.92) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spatial-quick-svg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spatial-quick-svg img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .quick-device-marker {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #ffffff;
            box-shadow: 0 2px 6px rgba(29, 158, 117, 0.25);
            transform: translate(-50%, -50%);
        }

        .panel-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .log-area {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 7px 8px;
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: "SF Mono", Menlo, Consolas, monospace;
            line-height: 1.5;
            max-height: 92px;
            overflow-y: auto;
        }

        .log-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.38);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .overlay.open { display: flex; }

        .modal {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            border: 0.5px solid var(--border-light);
            width: 400px;
            max-height: 480px;
            overflow-y: auto;
            padding: 16px;
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .modal-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            cursor: pointer;
            font-size: 16px;
            color: var(--text-secondary);
            background: none;
            border: none;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .scene-card {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            background: var(--bg-primary);
        }

        .scene-card:hover { background: var(--bg-secondary); }
        .scene-card.active { border-color: var(--accent); background: var(--accent-bg); }

        .scene-card-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .scene-card-desc {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .device-card {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: var(--bg-primary);
        }

        .device-name {
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .device-status {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .toggle {
            width: 32px;
            height: 18px;
            border-radius: 9px;
            background: var(--border-light);
            position: relative;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .toggle.on { background: var(--accent); }

        .toggle::after {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.16);
        }

        .toggle.on::after { left: 16px; }

        .spatial-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .spatial-toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tool-btn {
            appearance: none;
            border: 0.5px solid var(--border-mid);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .tool-btn.primary {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        .tool-btn:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .spatial-meta {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .plan-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
        }

        .plan-item {
            border: 0.5px solid var(--border-light);
            background: rgba(255, 255, 255, 0.85);
            border-radius: var(--radius-md);
            padding: 10px;
            cursor: pointer;
        }

        .plan-item.active {
            border-color: var(--accent);
            background: var(--accent-bg);
        }

        .plan-item-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .plan-item-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 3px;
        }

        .spatial-preview {
            border: 0.5px solid var(--border-light);
            background: rgba(255,255,255,0.75);
            border-radius: var(--radius-lg);
            padding: 10px;
        }

        .plan-preview-frame {
            position: relative;
            width: 100%;
            min-height: 220px;
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(241,247,244,0.92) 100%);
            border: 0.5px solid var(--border-light);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plan-preview-svg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plan-preview-svg img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .device-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #ffffff;
            box-shadow: 0 2px 8px rgba(29, 158, 117, 0.30);
            transform: translate(-50%, -50%);
        }

        .device-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .device-chip {
            padding: 5px 8px;
            border-radius: 999px;
            background: var(--bg-secondary);
            border: 0.5px solid var(--border-light);
            font-size: 11px;
            color: var(--text-secondary);
        }

        .empty-note {
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.6;
            padding: 8px 0;
        }

        .mapping-editor {
            margin-top: 12px;
            border-top: 0.5px solid var(--border-light);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mapping-editor-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mapping-editor-title {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .mapping-editor-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mapping-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
        }

        .mapping-row {
            display: grid;
            grid-template-columns: minmax(150px, 1.8fr) minmax(100px, 1fr) minmax(100px, 1fr) 42px;
            gap: 8px;
            align-items: center;
        }

        .mapping-input {
            width: 100%;
            min-width: 0;
            border: 0.5px solid var(--border-light);
            background: rgba(255,255,255,0.88);
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 12px;
            color: var(--text-primary);
            outline: none;
        }

        .mapping-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(29, 158, 117, 0.12);
        }

        .mapping-remove {
            appearance: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: 0.5px solid rgba(180, 75, 58, 0.28);
            background: rgba(180, 75, 58, 0.08);
            color: #b44b3a;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
        }

        .mapping-empty {
            border: 0.5px dashed var(--border-light);
            border-radius: 10px;
            padding: 12px;
            font-size: 12px;
            color: var(--text-tertiary);
            text-align: center;
            background: rgba(255,255,255,0.55);
        }

        .mapping-help {
            font-size: 11px;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        .rules-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rule-form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 12px;
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-lg);
            background: rgba(255,255,255,0.72);
        }

        .rule-form .mapping-input.full {
            grid-column: 1 / -1;
        }

        .rule-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
        }

        .rule-card {
            border: 0.5px solid var(--border-light);
            border-radius: var(--radius-md);
            background: rgba(255,255,255,0.82);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rule-card.off {
            opacity: 0.62;
        }

        .rule-card-head,
        .rule-card-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .rule-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .rule-card-meta,
        .rule-card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .rule-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .toast {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%) translateY(80px);
            padding: 10px 16px;
            background: rgba(44, 44, 42, 0.96);
            color: var(--bubble-user-text);
            font-size: 11px;
            border-radius: 999px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 20;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 980px) {
            body { padding: 0; }
            .app {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
        }

        @media (max-width: 760px) {
            .main { flex-direction: column; }
            .panel {
                width: 100%;
                border-left: none;
                border-top: 0.5px solid var(--border-light);
                max-height: 240px;
            }
            .card-grid { grid-template-columns: 1fr; }
            .mapping-row { grid-template-columns: 1fr; }
            .rule-form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="topbar">
            <div class="brand">
                <img class="brand-logo" src="/web/client/homemind-logo.png" alt="HomeMind Logo" onerror="this.onerror=null;this.src='/web/client/homemind-logo.svg';">
                <div class="brand-copy">
                    <div class="brand-name">HomeMind</div>
                    <div class="brand-sub">智能家居中央指令器 · EST. 2024</div>
                </div>
            </div>
            <div class="topbar-right">
                <div class="status"><div class="dot"></div><span>系统在线</span></div>
                <div class="clock" id="clock">--:--:--</div>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-labels">
                <div class="progress-label" data-step="bsr">BSR 召回</div>
                <div class="progress-label" data-step="lsr">LSR 精排</div>
                <div class="progress-label" data-step="llm">LLM 决策</div>
                <div class="progress-label" data-step="exec">执行反馈</div>
            </div>
            <div class="progress-track">
                <div class="progress-step" data-step="bsr"></div>
                <div class="progress-step" data-step="lsr"></div>
                <div class="progress-step" data-step="llm"></div>
                <div class="progress-step" data-step="exec"></div>
            </div>
        </div>

        <div class="main">
            <div class="chat-col">
                <div class="chat-messages" id="messages">
                    <div class="msg system">
                        <div class="bubble">Caillo！☆*: .｡. o(≧▽≦)o .｡.:*☆   主人，请尽情吩咐妲己哦   </div>
                        <div class="msg-time" id="boot-time">--:--:--</div>
                    </div>
                </div>

                <div class="chat-input-wrap">
                    <textarea class="chat-input" id="inputBox" rows="1" placeholder="告诉我你想要什么…" onkeydown="handleKey(event)"></textarea>
                    <button class="mic-btn" id="mic-btn" onclick="toggleVoiceInput()" title="语音输入">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                    <button class="send-btn" onclick="submitQuery()" title="发送">
                        <svg width="14" height="14" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 14L14 8 2 2v4.5l8 1.5-8 1.5z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-section">
                    <div class="section-label">传感器数据</div>
                    <div class="sensor-row">
                        <div class="sensor-card">
                            <div class="sensor-label">Temp</div>
                            <div class="sensor-val"><span id="current-temp">--</span><span class="sensor-unit">°C</span></div>
                        </div>
                        <div class="sensor-card">
                            <div class="sensor-label">Hum</div>
                            <div class="sensor-val"><span id="current-humidity">--</span><span class="sensor-unit">%</span></div>
                        </div>
                        <div class="sensor-card">
                            <div class="sensor-label">人数</div>
                            <div class="sensor-val"><span id="current-occupancy">--</span><span class="sensor-unit">人</span></div>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <div class="section-label">场景模式</div>
                    <div class="scene-quick-list" id="sceneQuickList"></div>
                </div>

                <div class="panel-section">
                    <div class="section-label">设备控制</div>
                    <div class="quick-device-list" id="deviceQuickList"></div>
                </div>

                <div class="panel-section">
                    <div class="section-label">空间配置</div>
                    <div class="spatial-quick" id="spatialQuickPanel"></div>
                </div>

                <div class="panel-section">
                    <div class="section-label">其他</div>
                    <div class="panel-actions">
                        <button class="tool-btn" type="button" onclick="openModal('spatial')">详细空间编辑</button>
                        <button class="tool-btn" type="button" onclick="openModal('rules')">自动化规则</button>
                    </div>
                </div>

                <div class="panel-section">
                    <div class="section-label">操作日志</div>
                    <div class="log-area" id="log">
                        <div class="log-line">--:--:--  系统 → 初始化完成</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="overlay" id="overlay" onclick="closeModal(event)">
            <div class="modal">
                <div class="modal-head">
                    <span class="modal-title" id="modalTitle"></span>
                    <button class="modal-close" onclick="closeOverlay()">✕</button>
                </div>
                <div id="modalBody"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
        <input type="file" id="floorPlanInput" accept=".svg,image/svg+xml" style="display:none">
        <input type="file" id="deviceMappingInput" accept=".json,application/json" style="display:none">
    </div>

    <script>
        const scenes = [
            { id: "sleep", name: "睡眠模式", desc: "关闭灯光、调节温度、安防布控" },
            { id: "entertainment", name: "观影模式", desc: "调暗灯光、启动电视、音响就绪" },
            { id: "work", name: "工作模式", desc: "明亮环境、关闭娱乐设备" },
            { id: "away", name: "离家模式", desc: "全关设备、安防启动" },
            { id: "morning", name: "早安模式", desc: "窗帘打开、轻柔音乐、温度适宜" },
            { id: "evening", name: "晚归模式", desc: "门廊亮起、室温预调、氛围灯光" }
        ];

        const deviceList = [
            { id: "air_conditioner", name: "空调" },
            { id: "light", name: "灯光" },
            { id: "tv", name: "电视" },
            { id: "water_heater", name: "热水器" },
            { id: "fan", name: "风扇" },
            { id: "speaker", name: "音响" },
            { id: "window", name: "窗户" }
        ];

        const API_BASE = window.location.origin;
        const progressOrder = ["bsr", "lsr", "llm", "exec"];
        let socket = null;
        let devices = {};
        let currentScene = "sleep";
        let activePipeline = null;
        let recognition = null;
        let isListening = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let lastVoiceResult = null;
        let toastTimer = null;
        let currentModal = null;
        let floorPlans = [];
        let deviceMappings = [];
        let tapRules = [];
        let selectedFloorPlanId = "";
        const floorPlanAssetUrls = new Map();
        const suggestedDeviceTypes = [
            "light",
            "air_conditioner",
            "tv",
            "water_heater",
            "fan",
            "speaker",
            "window",
            "plug",
            "switch",
            "sensor",
            "camera",
            "motion_sensor",
            "doorbell",
            "door_window_sensor",
            "robot_vacuum",
            "temperature_humidity_sensor"
        ];

        function pad(n) { return String(n).padStart(2, "0"); }

        function getFloorPlanAspectRatio(plan) {
            const width = Number(plan?.width) || 640;
            const height = Number(plan?.height) || 660;
            return `${width} / ${height}`;
        }

        async function getFloorPlanAssetUrl(planId) {
            if (floorPlanAssetUrls.has(planId)) {
                return floorPlanAssetUrls.get(planId);
            }
            const response = await fetch(`${API_BASE}/api/floor-plans/${planId}/svg`);
            if (!response.ok) {
                throw new Error("floor plan svg load failed");
            }
            const blob = await response.blob();
            const objectUrl = URL.createObjectURL(
                blob.type === "image/svg+xml" ? blob : new Blob([blob], { type: "image/svg+xml" })
            );
            floorPlanAssetUrls.set(planId, objectUrl);
            return objectUrl;
        }

        window.addEventListener("beforeunload", () => {
            floorPlanAssetUrls.forEach((url) => URL.revokeObjectURL(url));
            floorPlanAssetUrls.clear();
        });

        function getTime() {
            const d = new Date();
            return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
        }

        function tick() {
            document.getElementById("clock").textContent = getTime();
        }

        function autoResize() {
            const box = document.getElementById("inputBox");
            box.style.height = "40px";
            box.style.height = Math.min(box.scrollHeight, 120) + "px";
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");
        }

        function escapeAttr(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/"/g, "&quot;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function addMsg(role, html, tag) {
            const el = document.createElement("div");
            el.className = "msg " + role;
            const bubbleHtml = `<div class="bubble">${escapeHtml(html)}${tag ? `<span class="action-tag">${tag}</span>` : ""}</div>`;
            const timeHtml = `<div class="msg-time">${getTime()}</div>`;
            el.innerHTML = bubbleHtml + timeHtml;
            const msgs = document.getElementById("messages");
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addVoiceFeedbackMsg(data) {
            lastVoiceResult = data;
            const el = document.createElement("div");
            el.className = "msg system";
            const asrText = escapeHtml(data.text || "");
            const normalized = escapeHtml(data.normalized || data.text || "");
            el.innerHTML = `
                <div class="bubble">
                    语音识别：${asrText}<br>
                    归一化：${normalized}
                    <div class="voice-feedback">
                        <button onclick="sendVoiceFeedback('accepted')">正确</button>
                        <button onclick="sendVoiceFeedback('corrected')">纠正</button>
                        <button onclick="sendVoiceFeedback('ignored')">忽略</button>
                    </div>
                </div>
                <div class="msg-time">${getTime()}</div>
            `;
            const msgs = document.getElementById("messages");
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addLog(subject, status) {
            const log = document.getElementById("log");
            const line = document.createElement("div");
            line.className = "log-line";
            line.textContent = `${getTime()}  ${subject} → ${status}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("visible");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove("visible"), 2800);
        }

        function resetProgress() {
            progressOrder.forEach((step) => setProgressState(step, "wait"));
        }

        function setProgressState(step, state) {
            const label = document.querySelector(`.progress-label[data-step="${step}"]`);
            const bar = document.querySelector(`.progress-step[data-step="${step}"]`);
            [label, bar].forEach((el) => {
                if (!el) return;
                el.classList.remove("done", "active", "error");
                if (state !== "wait") {
                    el.classList.add(state);
                }
            });
        }

        function buildDeviceStatus(deviceId, state) {
            if (!state || !state.is_on) {
                return "关闭";
            }
            if (deviceId === "air_conditioner" && state.temperature !== undefined) {
                return `${state.temperature}°C`;
            }
            if (deviceId === "light" && state.brightness !== undefined) {
                return `亮度 ${state.brightness}%`;
            }
            return "开启";
        }

        function getDeviceName(id) {
            const match = deviceList.find((item) => item.id === id);
            return match ? match.name : id;
        }

        function getSceneName(id) {
            const match = scenes.find((item) => item.id === id);
            return match ? match.name : id;
        }

        function renderSceneQuickList() {
            const host = document.getElementById("sceneQuickList");
            if (!host) return;
            host.innerHTML = scenes.map((scene) => `
                <button class="scene-quick-btn ${currentScene === scene.id ? "active" : ""}" type="button" data-scene-quick="${scene.id}">
                    <div class="scene-quick-name">${scene.name}</div>
                    <div class="scene-quick-desc">${scene.desc}</div>
                </button>
            `).join("");
            host.querySelectorAll("[data-scene-quick]").forEach((button) => {
                button.addEventListener("click", () => switchScene(button.dataset.sceneQuick));
            });
        }

        function renderDeviceQuickList() {
            const host = document.getElementById("deviceQuickList");
            if (!host) return;
            host.innerHTML = deviceList.map((device) => {
                const state = devices[device.id] || {};
                return `
                    <div class="quick-device-card">
                        <div>
                            <div class="quick-device-name">${device.name}</div>
                            <div class="quick-device-status">${buildDeviceStatus(device.id, state)}</div>
                        </div>
                        <button class="toggle ${state.is_on ? "on" : ""}" type="button" data-device-quick="${device.id}"></button>
                    </div>
                `;
            }).join("");
            host.querySelectorAll("[data-device-quick]").forEach((button) => {
                button.addEventListener("click", () => {
                    const id = button.dataset.deviceQuick;
                    const state = devices[id] || {};
                    controlDevice(id, state.is_on ? "off" : "on");
                });
            });
        }

        function updateContext(ctx) {
            document.getElementById("current-temp").textContent = ctx.temperature ?? "--";
            document.getElementById("current-humidity").textContent = ctx.humidity ?? "--";
            document.getElementById("current-occupancy").textContent = ctx.occupancy ?? "--";
            if (ctx.scene) {
                currentScene = ctx.scene;
            }
            renderSceneQuickList();
            if (currentModal) {
                renderModal(currentModal);
            }
        }

        function updateDeviceState(id, state) {
            devices[id] = state || {};
            renderDeviceQuickList();
            if (currentModal === "device") {
                renderModal("device");
            }
        }

        function updateDevices(states) {
            Object.entries(states || {}).forEach(([id, state]) => {
                devices[id] = state || {};
            });
            renderDeviceQuickList();
            if (currentModal === "device") {
                renderModal("device");
            }
        }

        function normalizeDeviceMappingJson(parsed) {
            if (parsed == null) return { ok: false, error: "空 JSON", tuples: [] };
            let arr = parsed;
            if (!Array.isArray(arr)) {
                if (typeof parsed === "object") {
                    if (Array.isArray(parsed.devices)) arr = parsed.devices;
                    else if (Array.isArray(parsed.deviceMapping)) arr = parsed.deviceMapping;
                    else if (Array.isArray(parsed.mappings)) arr = parsed.mappings;
                    else if (Array.isArray(parsed.items)) arr = parsed.items;
                    else {
                        return { ok: false, error: '请使用 JSON 数组，或 { "devices": [ ... ] } 结构', tuples: [] };
                    }
                } else {
                    return { ok: false, error: "根节点必须是数组或对象", tuples: [] };
                }
            }
            if (arr.length === 0) return { ok: true, tuples: [] };
            const first = arr[0];
            if (Array.isArray(first)) {
                const tuples = arr
                    .filter((row) => Array.isArray(row) && row.length >= 2)
                    .map((row) => [
                        String(row[0]).trim(),
                        String(row[1]).trim(),
                        String(row[2] != null ? row[2] : "light").trim()
                    ])
                    .filter((row) => row[0] && row[1]);
                if (!tuples.length) {
                    return { ok: false, error: 'Tuple 结构至少应为 ["entity_id","area","device_type"]', tuples: [] };
                }
                return { ok: true, tuples };
            }
            if (first && typeof first === "object") {
                const tuples = arr
                    .map((obj) => {
                        const entity = obj.entity_id || obj.entityId || obj.id || obj.entity || "";
                        const area = obj.area || obj.room || obj.zone || "";
                        const type = obj.device_type || obj.deviceType || obj.type || "light";
                        const e = String(entity).trim();
                        const a = String(area).trim();
                        if (!e || !a) return null;
                        return [e, a, String(type).trim() || "light"];
                    })
                    .filter(Boolean);
                if (!tuples.length) {
                    return { ok: false, error: "对象结构必须包含 entity_id 和 area", tuples: [] };
                }
                return { ok: true, tuples };
            }
            return { ok: false, error: "无法识别的设备映射格式", tuples: [] };
        }

        function getSelectedPlan() {
            if (!floorPlans.length) return null;
            if (!selectedFloorPlanId) {
                selectedFloorPlanId = floorPlans[0].id;
            }
            return floorPlans.find((item) => item.id === selectedFloorPlanId) || floorPlans[0];
        }

        async function loadSpatialData() {
            const [planRes, mappingRes] = await Promise.all([
                fetch(`${API_BASE}/api/floor-plans`),
                fetch(`${API_BASE}/api/devices`)
            ]);
            const planJson = await planRes.json();
            const mappingJson = await mappingRes.json();
            floorPlans = planJson.floorPlans || [];
            deviceMappings = mappingJson.deviceMappings || [];
            if (!selectedFloorPlanId && floorPlans.length) {
                selectedFloorPlanId = floorPlans[0].id;
            }
        }

        function getMappingForPlan(planId) {
            return deviceMappings.find((item) => item.floorPlanId === planId) || null;
        }

        function buildSuggestedRoomList() {
            const roomSet = new Set();
            deviceMappings.forEach((mapping) => {
                (mapping.rawDevices || []).forEach((row) => {
                    if (row && row[1]) roomSet.add(String(row[1]));
                });
                (mapping.devices || []).forEach((item) => {
                    if (item && item.area) roomSet.add(String(item.area));
                });
            });
            return Array.from(roomSet).sort((a, b) => a.localeCompare(b, "zh-CN"));
        }

        function extractEditableRows(mapping) {
            if (!mapping) return [];
            if (Array.isArray(mapping.rawDevices) && mapping.rawDevices.length) {
                return mapping.rawDevices.map((row) => ({
                    entity_id: String(row[0] || ""),
                    area: String(row[1] || ""),
                    device_type: String(row[2] || "light")
                }));
            }
            if (Array.isArray(mapping.devices) && mapping.devices.length) {
                return mapping.devices.map((item) => ({
                    entity_id: String(item.entity_id || item.id || ""),
                    area: String(item.area || ""),
                    device_type: String(item.type || item.device_type || "light")
                }));
            }
            return [];
        }

        function renderMappingRows(rows, roomOptionsHtml) {
            const content = rows.length
                ? `
                    <div class="mapping-grid" id="mappingGrid">
                        ${rows.map((row, index) => `
                            <div class="mapping-row" data-row-index="${index}">
                                <input class="mapping-input" data-field="entity_id" value="${escapeAttr(row.entity_id || "")}" placeholder="entity_id，例如 light.bedroom_main">
                                <input class="mapping-input" data-field="area" value="${escapeAttr(row.area || "")}" placeholder="area，例如 bedroom" list="roomOptionsList">
                                <input class="mapping-input" data-field="device_type" value="${escapeAttr(row.device_type || "light")}" placeholder="device_type，例如 light" list="deviceTypeOptionsList">
                                <button class="mapping-remove" type="button" data-remove-row="${index}" title="删除这一行">×</button>
                            </div>
                        `).join("")}
                    </div>
                `
                : `<div class="mapping-empty">当前还没有设备映射。点击“新增一行”开始配置。</div>`;

            return `
                <div id="mappingRowsHost">
                    ${content}
                    <datalist id="roomOptionsList">${roomOptionsHtml}</datalist>
                    <datalist id="deviceTypeOptionsList">
                        ${suggestedDeviceTypes.map((type) => `<option value="${type}"></option>`).join("")}
                    </datalist>
                </div>
            `;
        }

        function readMappingRowsFromModal() {
            const grid = document.getElementById("mappingGrid");
            if (!grid) return [];
            return Array.from(grid.querySelectorAll(".mapping-row"))
                .map((row) => {
                    const entity_id = row.querySelector('[data-field="entity_id"]')?.value.trim() || "";
                    const area = row.querySelector('[data-field="area"]')?.value.trim() || "";

        function buildRuleCard(rule) {
            const trigger = (rule.trigger && rule.trigger[0]) || {};
            const action = (rule.action && rule.action[0]) || {};
            const target = action.target && action.target.entity_id ? action.target.entity_id : "--";
            return `
                <div class="rule-card ${rule.enabled ? "" : "off"}">
                    <div class="rule-card-head">
                        <div class="rule-card-title">${escapeHtml(rule.alias || rule.id)}</div>
                        <button class="toggle ${rule.enabled ? "on" : ""}" data-rule-toggle="${rule.id}"></button>
                    </div>
                    <div class="rule-card-desc">${escapeHtml(rule.description || "未填写描述")}</div>
                    <div class="rule-chip-row">
                        <span class="device-chip">触发 ${escapeHtml(trigger.platform || "--")}</span>
                        <span class="device-chip">动作 ${escapeHtml(action.service || "--")}</span>
                        <span class="device-chip">目标 ${escapeHtml(target)}</span>
                    </div>
                    <div class="rule-card-meta">更新于 ${escapeHtml((rule.updatedAt || rule.createdAt || "--").replace("T", " ").replace("Z", ""))}</div>
                    <div class="rule-card-actions">
                        <button class="tool-btn" data-rule-eval="${rule.id}">立即测试</button>
                        <button class="tool-btn" data-rule-delete="${rule.id}">删除</button>
                    </div>
                </div>
            `;
        }

        function collectRuleForm() {
            const alias = document.getElementById("ruleAlias")?.value.trim() || "";
            const description = document.getElementById("ruleDescription")?.value.trim() || "";
            const triggerPlatform = document.getElementById("ruleTriggerPlatform")?.value || "state";
            const triggerTarget = document.getElementById("ruleTriggerTarget")?.value.trim() || "";
            const triggerValue = document.getElementById("ruleTriggerValue")?.value.trim() || "";
            const actionService = document.getElementById("ruleActionService")?.value || "homeassistant.turn_on";
            const actionTarget = document.getElementById("ruleActionTarget")?.value.trim() || "";

            let trigger;
            if (triggerPlatform === "time") {
                trigger = [{ platform: "time", at: triggerValue || "22:30:00" }];
            } else if (triggerPlatform === "scene") {
                trigger = [{ platform: "scene", scene: triggerTarget || currentScene }];
            } else if (triggerPlatform === "numeric_state") {
                trigger = [{ platform: "numeric_state", entity_id: triggerTarget || "sensor.indoor_temperature", above: Number(triggerValue || 30) }];
            } else {
                trigger = [{ platform: "state", entity_id: triggerTarget || "light", to: triggerValue || "on" }];
            }

            return {
                alias: alias || "新自动化规则",
                description,
                enabled: true,
                trigger,
                condition: [],
                action: [{
                    service: actionService,
                    target: { entity_id: actionTarget || "light" }
                }]
            };
        }

        async function deleteTapRule(ruleId) {
            const response = await fetch(`${API_BASE}/api/tap-rules/${ruleId}`, { method: "DELETE" });
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.error || "规则删除失败");

            await renderRulesModal();

        async function evaluateTapRule(ruleId) {
            const rule = tapRules.find((item) => item.id === ruleId);
            if (!rule) return;
            const trigger = (rule.trigger && rule.trigger[0]) || { platform: "scene", scene: currentScene };
            const event =
                trigger.platform === "time"
                    ? { platform: "time", at: trigger.at || "22:30:00" }
                    : trigger.platform === "numeric_state"
                        ? { platform: "numeric_state", entity_id: trigger.entity_id, value: Number(trigger.above || 30) + 1 }
                        : trigger.platform === "scene"
                            ? { platform: "scene", scene: trigger.scene || currentScene }
                            : { platform: "state", entity_id: trigger.entity_id || "light", to: trigger.to || "on" };
            const response = await fetch(`${API_BASE}/api/tap-rules/evaluate`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ event })
            });
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.error || "规则测试失败");
            }
            const count = payload.evaluation?.executedRules?.length || 0;
            addLog("自动化", `${rule.alias} 执行 ${count} 次`);
            showToast(count ? "规则测试完成" : "规则未触发");
        }

            document.getElementById("saveRuleBtn")?.addEventListener("click", async () => {

            body.querySelectorAll("[data-rule-delete]").forEach((button) => {
                button.addEventListener("click", async () => {
                    try {
                        await deleteTapRule(button.dataset.ruleDelete);
                    } catch (err) {

            body.querySelectorAll("[data-rule-eval]").forEach((button) => {

        }

        async function renderModal(type) {
            const title = document.getElementById("modalTitle");
            const body = document.getElementById("modalBody");
            if (type === "scene") {
                title.textContent = "场景模式";
                body.innerHTML = `<div class="card-grid">${
                    scenes.map((scene) => `
                        <div class="scene-card ${currentScene === scene.id ? "active" : ""}" data-scene-id="${scene.id}">
                            <div class="scene-card-name">${scene.name}</div>
                            <div class="scene-card-desc">${scene.desc}</div>
                        </div>
                    `).join("")
                }</div>`;
                body.querySelectorAll(".scene-card").forEach((card) => {
                    card.addEventListener("click", () => {
                        const sceneId = card.dataset.sceneId;
                        switchScene(sceneId);
                        closeOverlay();
                    });
                });
            } else if (type === "device") {
                title.textContent = "设备控制";
                body.innerHTML = `<div class="card-grid">${
                    deviceList.map((device) => {
                        const state = devices[device.id] || {};
                        return `
                            <div class="device-card">
                                <div>
                                    <div class="device-name">${device.name}</div>
                                    <div class="device-status">${buildDeviceStatus(device.id, state)}</div>
                                </div>
                                <button class="toggle ${state.is_on ? "on" : ""}" data-device-id="${device.id}"></button>
                            </div>
                        `;
                    }).join("")
                }</div>`;
                body.querySelectorAll(".toggle").forEach((toggle) => {
                    toggle.addEventListener("click", () => {
                        const id = toggle.dataset.deviceId;
                        const state = devices[id] || {};
                        controlDevice(id, state.is_on ? "off" : "on");
                    });
                });
            } else if (type === "spatial") {
                title.textContent = "空间配置";
                body.innerHTML = `<div class="empty-note">正在加载空间数据…</div>`;
                try {
                    await loadSpatialData();
                    await renderSpatialModal();
                } catch (err) {
                    body.innerHTML = `<div class="empty-note">${escapeHtml(err.message || "空间数据加载失败")}</div>`;
                }
            }
        }

        const baseRenderModal = renderModal;
        renderModal = async function(type) {
            if (type === "rules") {
                const title = document.getElementById("modalTitle");
                const body = document.getElementById("modalBody");
                title.textContent = "自动化规则";
                body.innerHTML = `<div class="empty-note">正在加载规则...</div>`;
                try {
                    await renderRulesModal();
                } catch (err) {
                    body.innerHTML = `<div class="empty-note">${escapeHtml(err.message || "规则面板加载失败")}</div>`;
                }
                return;
            }
            return baseRenderModal(type);
        };

        function switchScene(scene) {
            socket.emit("message", { type: "scene_switch", data: { scene } });
            currentScene = scene;
            addLog("场景", getSceneName(scene));
        }

        function controlDevice(deviceId, action) {
            socket.emit("message", { type: "device_control", data: { device: deviceId, action, params: {} } });
        }

        function closeModal(e) {
            if (e.target === document.getElementById("overlay")) {
                closeOverlay();
            }
        }

        function closeOverlay() {
            document.getElementById("overlay").classList.remove("open");
            currentModal = null;
        }

        async function initVoiceRecognition() {
            if (!navigator.mediaDevices || !window.MediaRecorder) {
                showToast("当前浏览器不支持录音上传");
            }
        }

        async function toggleVoiceInput() {
            if (!navigator.mediaDevices || !window.MediaRecorder) {
                showToast("当前浏览器不支持录音上传");
                return;
            }
            if (isListening) {
                mediaRecorder.stop();
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                mediaRecorder.onstop = async () => {
                    isListening = false;
                    document.getElementById("mic-btn").classList.remove("listening");
                    stream.getTracks().forEach((track) => track.stop());
                    await uploadVoiceRecording();
                };
                mediaRecorder.start();
                isListening = true;
                document.getElementById("mic-btn").classList.add("listening");
                showToast("正在录音，再点一次结束");
            } catch (e) {
                showToast("无法访问麦克风");
            }
        }

        async function uploadVoiceRecording() {
            if (!audioChunks.length) {
                showToast("没有录到声音");
                return;
            }
            const mimeType = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : "audio/webm";
            const blob = new Blob(audioChunks, { type: mimeType });
            const form = new FormData();
            form.append("audio", blob, mimeType.includes("wav") ? "voice.wav" : "voice.webm");
            form.append("lang", "auto");
            showToast("正在本地识别语音");
            try {
                const response = await fetch("/api/voice/transcribe", {
                    method: "POST",
                    body: form
                });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.hint || data.error || "语音识别失败");
                    return;
                }
                const text = data.normalized || data.text || "";
                if (!text) {
                    showToast("没有识别到有效指令");
                    return;
                }
                document.getElementById("inputBox").value = text;
                autoResize();
                addLog("语音", data.text || text);
                addVoiceFeedbackMsg(data);
                submitQuery();
            } catch (e) {
                showToast("语音上传失败");
            }
        }

        async function sendVoiceFeedback(feedback) {
            if (!lastVoiceResult) {
                showToast("没有可反馈的语音记录");
                return;
            }
            let correctedText = "";
            let correctedNormalized = "";
            if (feedback === "corrected") {
                correctedText = window.prompt("请输入正确的识别文本或标准指令", lastVoiceResult.normalized || lastVoiceResult.text || "") || "";
                correctedText = correctedText.trim();
                if (!correctedText) {
                    showToast("已取消纠正");
                    return;
                }
            }
            try {
                const response = await fetch("/api/voice/feedback", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        asr_text: lastVoiceResult.text || "",
                        normalized: lastVoiceResult.normalized || "",
                        corrected_text: correctedText,
                        corrected_normalized: correctedNormalized,
                        language: lastVoiceResult.language || "unknown",
                        confidence: lastVoiceResult.confidence || 0,
                        engine: lastVoiceResult.engine || "vosk",
                        feedback
                    })
                });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.error || "反馈记录失败");
                    return;
                }
                showToast("语音反馈已记入历史");
            } catch (e) {
                showToast("反馈提交失败");
            }
        }

        function handlePipelineUpdate(msg) {
            const { type, data } = msg;
            if (type === "pipeline_start") {
                activePipeline = data.steps || {};
                resetProgress();
                setProgressState("bsr", "active");
                return;
            }
            if (type === "pipeline_error") {
                progressOrder.forEach((step) => setProgressState(step, "error"));
                activePipeline = null;
                return;
            }
            if (type !== "pipeline_step" || !data.step) {
                return;
            }
            activePipeline = activePipeline || {};
            activePipeline[data.step] = data.data || {};
            const currentIndex = progressOrder.indexOf(data.step);
            progressOrder.forEach((step, index) => {
                if (index < currentIndex || index === currentIndex) {
                    setProgressState(step, "done");
                } else if (index === currentIndex + 1) {
                    setProgressState(step, "active");
                } else {
                    setProgressState(step, "wait");
                }
            });
            if (data.step === "exec") {
                activePipeline = null;
            }
        }

        function handleMessage(msg) {
            const { type, data } = msg;
            switch (type) {
                case "connected":
                    updateContext(data.context || {});
                    updateDevices(data.devices || {});
                    break;
                case "agent_response":
                    addMsg("ai", data.result, "执行完成");
                    addLog("系统", data.result);
                    loadStatus();
                    break;
                case "agent_clarification":
                    addMsg("ai", data.question, "需要澄清");
                    addLog("系统", data.question);
                    break;
                case "device_update":
                    updateDeviceState(data.device, data.state);
                    addLog(getDeviceName(data.device), buildDeviceStatus(data.device, data.state));
                    break;
                case "scene_update":
                    currentScene = data.scene;
                    updateDevices(data.devices || {});
                    addLog("场景", getSceneName(data.scene));
                    if (currentModal === "scene") {
                        renderModal("scene");
                    }
                    break;
                default:
                    break;
            }
        }

        function initWebSocket() {
            socket = io(API_BASE);
            socket.on("connect", () => addLog("系统", "连接已建立"));
            socket.on("disconnect", () => addLog("系统", "连接已断开"));
            socket.on("message", handleMessage);
            socket.on("pipeline_update", handlePipelineUpdate);
        }

        function loadStatus() {
            fetch(`${API_BASE}/api/status`)
                .then((r) => r.json())
                .then((data) => {
                    updateContext(data.context || {});
                    updateDevices(data.devices || {});
                })
                .catch(() => showToast("加载状态失败"));
        }

        document.addEventListener("DOMContentLoaded", () => {
            tick();
            setInterval(tick, 1000);
            document.getElementById("boot-time").textContent = getTime();
            resetProgress();
            autoResize();
            renderSceneQuickList();
            renderDeviceQuickList();
            initVoiceRecognition();
            initWebSocket();
            document.getElementById("floorPlanInput").addEventListener("change", async (event) => {
                const file = event.target.files?.[0];
                event.target.value = "";
                if (!file) return;
                try {
                    await handleFloorPlanUpload(file);
                } catch (err) {
                    showToast(err.message || "户型图上传失败");
                }
            });
            document.getElementById("deviceMappingInput").addEventListener("change", async (event) => {
                const file = event.target.files?.[0];
                event.target.value = "";
                if (!file) return;
                try {
                    await handleDeviceMappingUpload(file);
                } catch (err) {
                    showToast(err.message || "设备映射导入失败");
                }
            });
            loadStatus();
            renderSpatialQuickPanel();
        });
    </script>
</body>
</html>
